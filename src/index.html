<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VNA Viewer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>VNA Viewer</h1>
        <nav id="views" hidden>
          <button data-view="db" class="active">dB</button>
          <button data-view="phase">Phase</button>
          <button data-view="vswr" hidden>VSWR</button>
          <button data-view="smith">Smith</button>
        </nav>
        <button id="clear" hidden>Clear</button>
      </header>
      <main>
        <div id="drop-zone">
          <p>Drop a .s1p or .s2p file</p>
          <small>or click to browse</small>
        </div>
        <div id="chart" hidden></div>
      </main>
      <div id="markers" hidden>
        <div id="marker-list"></div>
      </div>
    </div>
    <script type="module" src="main.ts"></script>
  </body>
</html>
