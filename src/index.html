<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VNA Viewer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>VNA Viewer</h1>
        <nav id="views" hidden>
          <button data-view="db" class="active">dB</button>
          <button data-view="phase" data-i18n="phase">Phase</button>
          <button data-view="vswr">VSWR</button>
          <button data-view="groupdelay" data-i18n="groupDelay">Group Delay</button>
          <button data-view="smith">Smith</button>
          <button data-view="polar" data-i18n="polar">Polar</button>
        </nav>
        <button id="compare" hidden data-i18n="compare">Compare</button>
        <button id="export-csv" hidden data-i18n="exportCsv">Export CSV</button>
        <button id="clear" hidden data-i18n="clearAllFiles">Clear all</button>
        <button id="lang-toggle" type="button"></button>
        <button id="theme-toggle" type="button"></button>
        <a
          id="repo-link"
          href="https://github.com/reynico/vnaview"
          target="_blank"
          rel="noopener"
        >GitHub ↗</a>
      </header>
      <div id="file-bar" hidden>
        <div id="file-chips"></div>
      </div>
      <div id="scale-bar" hidden>
        <label><span id="scale-div-unit">dB</span>/DIV <input id="scale-div" type="number" value="10" step="1" min="0.001" /></label>
        <label>REF <input id="scale-ref" type="number" value="0" step="1" /> <span id="scale-ref-unit">dB</span></label>
        <button id="scale-auto" data-i18n="autoscale">Autoscale</button>
      </div>
      <div class="body-row">
        <main>
          <div id="drop-zone">
            <p data-i18n="dropLine1">Drop a .s1p or .s2p file</p>
            <small data-i18n="dropLine2">or click to browse</small>
          </div>
          <div id="scope-area" hidden>
            <div id="trace-info-bar"></div>
            <div id="chart-wrap">
              <div id="chart"></div>
              <div id="marker-overlay" hidden>
                <table id="marker-table">
                  <thead>
                    <tr>
                      <th></th>
                      <th data-i18n="markerTableFreq">Freq</th>
                      <th data-i18n="markerTableValue">Value</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
              <div id="bw-overlay" hidden></div>
            </div>
            <div id="freq-bar" hidden>
              <label><span data-i18n="freqStart">START</span> <input id="freq-start" type="number" step="0.001" /> MHz</label>
              <label><span data-i18n="freqStop">STOP</span> <input id="freq-stop" type="number" step="0.001" /> MHz</label>
              <label><span data-i18n="freqCenter">CENTER</span> <input id="freq-center" type="number" step="0.001" /> MHz</label>
              <label><span data-i18n="freqSpan">SPAN</span> <input id="freq-span" type="number" step="0.001" /> MHz</label>
            </div>
          </div>
        </main>
        <aside id="softkey-rail" hidden>
          <div class="rail-group">
            <div class="rail-label" data-i18n="railSearch">Search</div>
            <button id="search-peak" data-i18n="markerToPeak">Marker→Peak</button>
            <button id="search-min" data-i18n="markerToMin">Marker→Min</button>
            <button id="search-next-left" data-i18n="peakSearchLeft">Peak Search ←</button>
            <button id="search-next-right" data-i18n="peakSearchRight">Peak Search →</button>
            <button id="bw-search" data-i18n="bwSearch">BW Search</button>
            <label class="rail-input-label"><span data-i18n="threshold">Threshold</span>
              <input id="bw-threshold" type="number" value="3" step="0.5" min="0.1" /> dB
            </label>
          </div>
          <div class="rail-group">
            <div class="rail-label" data-i18n="railMarkers">Markers</div>
            <button id="marker-delta-toggle" data-i18n="deltaRef">Δ Ref</button>
            <button id="marker-new-center" data-i18n="newAtCenter">New at Center</button>
            <button id="marker-clear-active" data-i18n="clearActive">Clear Active</button>
            <button id="marker-clear-all" data-i18n="clearAllMarkers">Clear All</button>
          </div>
          <div class="rail-group">
            <div class="rail-label" data-i18n="railLimits">Limits</div>
            <label class="rail-input-label"><span data-i18n="limitUpper">Upper Limit</span>
              <input id="limit-upper" type="number" value="-10" step="0.5" /> dB
            </label>
            <button id="limit-upper-toggle" data-i18n="limitEnable">Enable</button>
            <label class="rail-input-label"><span data-i18n="limitLower">Lower Limit</span>
              <input id="limit-lower" type="number" value="-30" step="0.5" /> dB
            </label>
            <button id="limit-lower-toggle" data-i18n="limitEnable">Enable</button>
          </div>
          <div class="rail-group">
            <div class="rail-label" data-i18n="railMemory">Memory</div>
            <button id="memory-save" data-i18n="memorySave">Save Memory</button>
            <button id="memory-toggle" data-i18n="memoryShow">Show Memory</button>
            <button id="memory-clear" data-i18n="memoryClear">Clear Memory</button>
          </div>
        </aside>
      </div>
    </div>
    <script type="module" src="main.ts"></script>
  </body>
</html>
